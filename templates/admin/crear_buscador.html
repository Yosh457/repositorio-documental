{% extends "base.html" %}
{% block title %}Crear Buscador{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto my-12 bg-white p-8 rounded-xl shadow-lg">
    
    <div class="border-b pb-4 mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Crear Nuevo Buscador</h2>
        <p class="text-gray-500 text-sm mt-1">Registra un nuevo repositorio apuntando a una ruta de red física.</p>
    </div>

    <form method="post" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div>
            <label for="nombre" class="block text-sm font-bold text-gray-700 mb-1">Nombre del Buscador (Visible para usuarios)</label>
            <input type="text" name="nombre" id="nombre" 
                   value="{{ datos_previos.nombre if datos_previos else '' }}"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" 
                   placeholder="Ej: Fichas Clínicas" required>
        </div>

        <div>
            <label for="ruta_carpeta" class="block text-sm font-bold text-gray-700 mb-1">Ruta de Red Física (Storage)</label>
            <input type="text" name="ruta_carpeta" id="ruta_carpeta" 
                   value="{{ datos_previos.ruta_carpeta if datos_previos else '' }}"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition font-mono text-sm" 
                   placeholder="Ej: //10.20.10.7/Digitalizacion" required>
            <p class="text-xs text-gray-500 mt-2">Asegúrate de que la aplicación tenga permisos de lectura sobre esta ruta en el servidor.</p>
        </div>

        <div class="flex justify-end gap-4 pt-6 border-t border-gray-100 mt-8">
            <a href="{{ url_for('admin.listar_buscadores') }}" class="px-6 py-2 border border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-50 transition">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700 transition">Crear Buscador</button>
        </div>
    </form>
</div>
{% endblock %}
